<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redfinger Auto Check-in</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a1428 0%, #1e3a8a 100%);
      color: #e0f2fe;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 40px auto;
      background: rgba(15, 23, 42, 0.98);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(59, 130, 246, 0.6);
      border: 1px solid #60a5fa;
    }
    .header {
      background: linear-gradient(90deg, #1e40af, #3b82f6);
      padding: 40px 20px;
      text-align: center;
      color: white;
    }
    .header h1 { font-size: 2.6rem; margin: 0; }
    .content { padding: 40px 30px; }
    input, select {
      width: 100%;
      padding: 16px;
      margin: 12px 0;
      background: #334155;
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 1.1rem;
    }
    button {
      width: 100%;
      padding: 18px;
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.3rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
    }
    .status {
      padding: 20px;
      margin: 20px 0;
      border-radius: 12px;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🚀 REDFINGER AUTO CHECK-IN</h1>
      <p>Automated VIP Farming Service</p>
    </div>

    <div class="content">
      <h2 style="text-align:center; margin-bottom:25px;">Place Your Order</h2>
      
      <input type="text" id="customer" placeholder="Your Name / Nickname" value="">
      <input type="number" id="days" placeholder="Number of Days" value="2000">
      <select id="vip">
        <option value="VIP">VIP</option>
        <option value="KVIP">KVIP</option>
        <option value="SVIP" selected>SVIP</option>
        <option value="XVIP">XVIP</option>
      </select>

      <button onclick="submitOrder()">🚀 PLACE ORDER NOW</button>

      <div id="result"></div>
    </div>
  </div>

  <script>
    const BOT_TOKEN = "8758270440:AAEdUvBIKpGqhu0CzsLcOV3oQnwRP7c25jI";
    const CHAT_ID = "6598357465";

    async function submitOrder() {
      const customer = document.getElementById('customer').value.trim() || "Anonymous";
      const days = document.getElementById('days').value;
      const vip = document.getElementById('vip').value;

      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = `<div class="status" style="background:#22c55e; color:black;">
        ✅ Order Received Successfully!<br>
        <strong>${customer}</strong> — ${days} days of ${vip}
      </div>`;

      // Send to Telegram
      const message = `🆕 *New Redfinger Order!*\n\n👤 Customer: ${customer}\n📅 Days: ${days}\n⭐ VIP: ${vip}\n⏰ ${new Date().toLocaleString()}`;

      try {
        const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            chat_id: CHAT_ID,
            text: message,
            parse_mode: 'Markdown'
          })
        });

        const data = await response.json();
        console.log("Telegram Response:", data);

        if (data.ok) {
          console.log("✅ Message sent to Telegram successfully");
        } else {
          alert("Order saved but Telegram notification failed.");
        }
      } catch(e) {
        console.error("Error sending to Telegram:", e);
        alert("Order received! (But Telegram notification failed - check console)");
      }
    }
  </script>
</body>
</html>
