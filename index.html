<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redfinger Auto • Fast VIP Farming</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a1428 0%, #1e3a8a 100%);
      color: #e0f2fe;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 30px auto;
      background: rgba(15, 23, 42, 0.95);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(59, 130, 246, 0.5);
      border: 1px solid #60a5fa;
    }

    .header {
      background: linear-gradient(90deg, #1e40af, #3b82f6);
      padding: 40px 20px;
      text-align: center;
      color: white;
    }

    .header h1 { font-size: 2.8rem; margin-bottom: 8px; }

    input, select {
      width: 100%;
      padding: 16px;
      margin: 10px 0;
      background: #334155;
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 1.1rem;
    }

    button {
      width: 100%;
      padding: 18px;
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.3rem;
      font-weight: 600;
      cursor: pointer;
      margin: 15px 0;
    }

    button:hover {
      background: linear-gradient(90deg, #2563eb, #3b82f6);
    }

    .status {
      padding: 20px;
      margin: 20px;
      border-radius: 12px;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🚀 REDFINGER AUTO CHECK-IN</h1>
      <p>Automated VIP Farming Service</p>
    </div>

    <div style="padding: 40px 30px;">
      <h2 style="text-align:center; margin-bottom:30px;">Place Your Order</h2>
      
      <input type="text" id="customer" placeholder="Your Name / Nickname" required>
      <input type="number" id="days" placeholder="Number of Days" value="2000" required>
      <select id="vip">
        <option value="VIP">VIP</option>
        <option value="KVIP">KVIP</option>
        <option value="SVIP" selected>SVIP</option>
        <option value="XVIP">XVIP</option>
      </select>

      <button onclick="submitOrder()">🚀 PLACE ORDER NOW</button>
    </div>
  </div>

  <script>
    const BOT_TOKEN = "8758270440:AAEdUvBIKpGqhu0CzsLcOV3oQnwRP7c25jI";
    const CHAT_ID = "6598357465";

    async function submitOrder() {
      const customer = document.getElementById('customer').value.trim() || "Anonymous";
      const days = document.getElementById('days').value;
      const vip = document.getElementById('vip').value;

      // Show success message on website
      const statusDiv = document.createElement('div');
      statusDiv.className = 'status';
      statusDiv.style.background = '#22c55e';
      statusDiv.style.color = 'black';
      statusDiv.innerHTML = `✅ Order Received Successfully!<br><strong>${customer}</strong> — ${days} days of ${vip}<br>We'll start processing now.`;
      document.body.appendChild(statusDiv);

      // Send notification to your Telegram
      const message = `🆕 *New Redfinger Order!*\n\n👤 Customer: ${customer}\n📅 Days: ${days}\n⭐ VIP Level: ${vip}\n⏰ Time: ${new Date().toLocaleString()}`;

      try {
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(message)}&parse_mode=Markdown`);
        console.log("✅ Order sent to Telegram");
      } catch(e) {}
    }
  </script>
</body>
</html>
